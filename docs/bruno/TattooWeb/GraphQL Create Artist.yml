  body: |-
    mutation {
      createArtist(command: {
        cpf: "777.888.999-00"
        name: "Maria Tattoo"
        specialty: BLACKWORK
        bio: "Especialista em blackwork minimalista"
        phone: "11922221111"
      }) {
        id
        name
        specialty
      }
    }
