info:
  name: GraphQL Create Artist
  type: graphql
  seq: 7

graphql:
  method: POST
  url: http://localhost:5266/graphql
  body:
    query: |-
      mutation {
        createArtist(command: {
          cpf: "777.866.999-00"
          name: "José Rick"
          specialty: OLD_SCHOOL
          bio: "Especialista em desenvolvimento"
          phone: "11922133111"
        }) {
          id
          name
          specialty
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
