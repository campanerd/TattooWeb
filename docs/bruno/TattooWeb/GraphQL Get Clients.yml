info:
  name: GraphQL Get Clients
  type: graphql
  seq: 12

graphql:
  method: POST
  url: http://localhost:5266/graphql
  body:
    query: |-
      query {
        clients {
          id
          cpf
          name
          email
          phone
          allergy
          createdAt
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
