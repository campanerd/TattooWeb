services:
  postgres:
    image: postgres:17
    container_name: tattooweb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tattooweb
    ports:
      - "5434:5432"
    volumes:
      - tattooweb-pgdata:/var/lib/postgresql/data

volumes:
  tattooweb-pgdata:
